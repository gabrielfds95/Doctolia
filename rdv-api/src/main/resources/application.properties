# Global configuration
# Nom de l'application
spring.application.name=rdv-api

# Tomcat configuration
# Port 9000 pour eviter le conflit avec le port 8080 par defaut
server.port=9000

# Log level configuration
# Limite les logs des bibliotheques tierces a ERROR
logging.level.root=ERROR

# Log en INFO pour notre propre code
logging.level.com.rdvmedic=INFO

# Voir l'URL JDBC de H2 au demarrage
logging.level.org.springframework.boot.autoconfigure.h2=INFO

# Voir le port Tomcat au demarrage
logging.level.org.springframework.boot.web.embedded.tomcat=INFO

# Initialisation de la base de donnees
# Assure que data.sql est execute APRES la creation des tables
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# H2 Configuration
# Active la console H2 (accessible sur http://localhost:9000/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Hibernate gere la creation des tables
spring.jpa.hibernate.ddl-auto=update

# Affichage SQL (Optionnel, debranche pour plus de clarte)
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# En production : définir la variable d'environnement JWT_SECRET
# En dev : la valeur par défaut est utilisée automatiquement
app.jwt.secret=${JWT_SECRET:doctolia-secret-jwt-key-must-be-at-least-32chars-long}
app.jwt.expiration=900000